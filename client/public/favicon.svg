<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- White rounded square — matches landing page logo tile -->
  <rect width="64" height="64" rx="12" fill="#ffffff"/>
  <rect width="64" height="64" rx="12" fill="none" stroke="#e2e8f0" stroke-width="2"/>

  <!-- Coins icon: two stacked coin rings (stroke only, like lucide Coins) -->
  <!-- Back coin -->
  <circle cx="36" cy="26" r="12" fill="none" stroke="#0f172a" stroke-width="3.5"/>
  <!-- Front coin (overlaps) -->
  <circle cx="26" cy="38" r="12" fill="#ffffff" stroke="#0f172a" stroke-width="3.5"/>
  <!-- Inner detail line on front coin -->
  <circle cx="26" cy="38" r="6" fill="none" stroke="#0f172a" stroke-width="1.5" opacity="0.4"/>
</svg>
